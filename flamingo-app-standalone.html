 "بحبك" بدون كلام؟'},{id:"nrm8",categoryId:"romance",text:"If we relived one date exactly as it was, which one?",ar:"لو منعيد موعد واحد متل ما كان بالضبط، أي واحد؟"},{id:"nrm9",categoryId:"romance",text:"What song do you secretly connect to us?",ar:"شو الأغنية اللي سرًا بتربطها فينا؟"},{id:"nrm10",categoryId:"romance",text:"{G}, when do you feel most beautiful around {B}?",ar:"يا {G}، إيمتى بتحسي حالك أحلى شي وإنتي حد {B}؟"},{id:"r13",categoryId:"romance",text:"What little thing do I do that still gives you butterflies?",ar:"شو الشي الزغير اللي بعمله ولسا بيعملك فراشات بالمعدة؟"},{id:"r14",categoryId:"romance",text:"Where were we when you first felt completely comfortable with me?",ar:"وين كنا لما حسيت أول مرة إنك مرتاح معي بالكامل؟"},{id:"r15",categoryId:"romance",text:"What's your favorite photo of us, and what do you remember about that moment?",ar:"شو أحلى صورة إلنا سوا، وشو بتتذكر عن هديك اللحظة؟"},{id:"r16",categoryId:"romance",text:"If we redid our first date knowing everything we know now, what changes?",ar:"لو عدنا أول موعد إلنا ونحنا عارفين كل شي منعرفه هلق، شو رح يتغير؟"},{id:"r17",categoryId:"romance",text:"What's a date idea you've thought about but never suggested?",ar:"شو فكرة الموعد اللي فكرت فيها وعمرك ما اقترحتها؟"},{id:"r18",categoryId:"romance",text:"When did you last brag about me to someone?",ar:"إيمتى آخر مرة تباهيت فيي قدام حدا؟"},{id:"r19",categoryId:"romance",text:"What's the most romantic thing I've done without realizing it was romantic?",ar:"شو أكتر شي رومانسي عملته بدون ما أعرف إنه رومانسي؟"},{id:"r20",categoryId:"romance",text:"Slow dancing in the kitchen or stargazing on the roof — pick our next tiny date.",ar:"رقصة بطيئة بالمطبخ ولا نتفرج عالنجوم عالسطح — اختار موعدنا الزغير الجاي."},{id:"r21",categoryId:"romance",text:"What did you tell your best friend about me after our first date?",ar:"شو خبرت أعز صديق إلك عني بعد أول موعد؟"},{id:"r22",categoryId:"romance",text:"What's one thing I wear that you wish I'd wear more often?",ar:"شو الشي اللي بلبسه وبتتمنى البسه أكتر؟"},{id:"r23",categoryId:"romance",text:"How do you know when I'm about to kiss you?",ar:"كيف بتعرف إني ع وشك بوسك؟"},{id:"r24",categoryId:"romance",text:"What's your favorite kind of hug from me: hello, goodbye, or 'just because'?",ar:"شو أحب حضن مني: حضن اللقا، حضن الوداع، ولا حضن «هيك من دون سبب»؟"},{id:"r25",categoryId:"romance",text:"If I planned a surprise evening tomorrow, what three things should be in it?",ar:"لو خططت لسهرة مفاجأة بكرا، شو التلات أشيا اللازم تكون فيها؟"},{id:"r26",categoryId:"romance",text:"What song would you dedicate to me on the radio, old-school style?",ar:"شو الأغنية اللي بتهديني ياها عالراديو، عالطريقة القديمة؟"},{id:"r27",categoryId:"romance",text:"When do I look at you in a way that says everything without words?",ar:"إيمتى بتطلع فيك نظرة بتقول كل شي بلا كلام؟"},{id:"r28",categoryId:"romance",text:"What's a small ritual of ours you'd never give up?",ar:"شو الطقس الزغير بيناتنا اللي بحياتك ما بتتخلى عنه؟"},{id:"r29",categoryId:"romance",text:"Candles and dinner at home, or dressing up and going out — tonight's pick?",ar:"شموع وعشا بالبيت، ولا نتأنق ونطلع — شو خيار الليلة؟"},{id:"r30",categoryId:"romance",text:"What compliment from me do you replay in your head?",ar:"شو المديح مني اللي بتعيد تشغيله براسك؟"},{id:"r31",categoryId:"romance",text:"Where in the world would you want to kiss me the most?",ar:"بأي مكان بالعالم بتتمنى تبوسني أكتر شي؟"},{id:"r32",categoryId:"romance",text:"What's one thing about our love story that sounds made-up when you tell it?",ar:"شو الشي بقصة حبنا اللي بيبين خيالي لما تخبره؟"},{id:"r33",categoryId:"romance",text:"How has my idea of romance changed yours?",ar:"كيف مفهومي للرومانسية غيّر مفهومك؟"},{id:"r34",categoryId:"romance",text:"What's the smallest gift I could give you that would mean the most?",ar:"شو أزغر هدية فيني قدمها إلك وتعنيلك أكتر شي؟"},{id:"r35",categoryId:"romance",text:"When we're old, what do you think we'll still flirt about?",ar:"لما نكبر، شو الشي اللي ر ou secretly want us to do anyway?",ar:"شو الكليشيه الرومانسي اللي بالسر بدك نعمله رغم كل شي؟"},{id:"r50",categoryId:"romance",text:"Halfway card: hold hands for the next five questions. Non-negotiable.",ar:"بطاقة النص: مسكوا إيدين بعض للخمس أسئلة الجايات. مش قابلة للنقاش."},{id:"r51",categoryId:"romance",text:"What part of our routine feels most like a love language?",ar:"شو الجزء من روتيننا اللي بيحس أكتر شي إنه لغة حب؟"},{id:"r52",categoryId:"romance",text:"What's the most attractive decision I've ever made?",ar:"شو أكتر قرار جذاب أخدته بحياتي؟"},{id:"r53",categoryId:"romance",text:"Which movie couple are we on a good day? And on a chaotic day?",ar:"أي ثنائي أفلام منكون بيوم حلو؟ وبيوم فوضوي؟"},{id:"r54",categoryId:"romance",text:"What's one thing you want us to slow down and savor more?",ar:"شو الشي اللي بدك نبطئ ونتذوقه أكتر؟"},{id:"r55",categoryId:"romance",text:"When you can't sleep, what's one memory of us you visit?",ar:"لما ما تقدر تنام، شو الذكرى إلنا اللي بتزورها؟"},{id:"r56",categoryId:"romance",text:"What would you write on a tiny card attached to flowers for me?",ar:"شو رح تكتب عالكرت الزغير المعلق بباقة ورد إلي؟"},{id:"r57",categoryId:"romance",text:"What's my most kissable feature, in your expert opinion?",ar:"شو أكتر شي فيني بيستاهل البوس، برأيك الخبير؟"},{id:"r58",categoryId:"romance",text:"What tradition should we start doing every anniversary?",ar:"شو التقليد اللي لازم نبلش نعمله بكل ذكرى سنوية؟"},{id:"r59",categoryId:"romance",text:"What's something romantic you did for someone in your imagination only — and should we make it real?",ar:"شو الشي الرومانسي اللي عملته بخيالك بس — ولازم نحققه عن جد؟"},{id:"r60",categoryId:"romance",text:"How do you like being comforted after a hard day: words, touch, food, or space?",ar:"كيف بتحب حدا يواسيك بعد يوم صعب: كلام، لمسة، أكل، ولا مساحة؟"},{id:"r61",categoryId:"romance",text:"What's the most beautiful place we've been together so far?",ar:"شو أجمل مكان رحنا عليه سوا لهلق؟"},{id:"r62",categoryId:"romance",text:"When do you feel most like we're a team?",ar:"إيمتى بتحس أكتر شي إنا فريق واحد؟"},{id:"r63",categoryId:"romance",text:"What's one sentence you hope I never stop saying to you?",ar:"شو الجملة اللي بتتمنى ما بطّل قولها إلك أبدًا؟"},{id:"r64",categoryId:"romance",text:"Which was more romantic: our best planned date or our best accidental one?",ar:"أيهما كان أرومانسي: أحلى موعد مخطط إلنا ولا أحلى موعد صار صدفة؟"},{id:"r65",categoryId:"romance",text:"What's your favorite thing I've ever cooked or made for you?",ar:"شو أحب شي طبخته أو عملته إلك بحياتي؟"},{id:"r66",categoryId:"romance",text:"If we renewed our story every year like a contract, what clause would you add?",ar:"لو منجدد قصتنا كل سنة متل العقد، شو البند اللي بتضيفه؟"},{id:"r67",categoryId:"romance",text:"What's one way I love you that you didn't know you needed?",ar:"شو الطريقة اللي بحبك فيها وما كنت تعرف إنك محتاجها؟"},{id:"r68",categoryId:"romance",text:"Describe my laugh to someone who's never heard it.",ar:"وصف ضحكتي لحدا عمره ما سمعها."},{id:"r69",categoryId:"romance",text:"What's the bravest thing you did for us?",ar:"شو أشجع شي عملته عشانا نحنا التنين؟"},{id:"r70",categoryId:"romance",text:"Where should our next getaway be — and what's the very first thing we do there?",ar:"وين لازم تكون سفرتنا الجاية — وشو أول شي منعمله هونيك؟"},{id:"r71",categoryId:"romance",text:"What do my hands tell you when words don't?",ar:"شو بتخبرك إيديي لما الكلام ما بيوصل؟"},{id:"r72",categoryId:"romance",text:"What's a moment I made you feel chosen?",ar:"شو اللحظة اللي خليتك تحس فيها إنك الشخص المختار؟"},{id:"r73",categoryId:"romance",text:"Which nickname of ours has the best origin story? Tell it.",ar:"أي لقب من ألقابنا إله أحلى قصة؟ خبرها."},{id:"r74",categoryId:"romance",text:"What's one thing about the way I love that you hope never changes?",ar:"شو الشي بطريقتي بالحب اللي بتتمنى ما يتغير أبدًا؟"},{id:"r75",categoryId:"romance",text:"If tonight ended with one perfect moment, describe it.",ar:"لو الليلة بتخلص بلحظة وحدة مثالية، وصفها."},{id:"r76",categoryId:"romance",text:"What's your favorite 'boring' thing we do together?",ar:"شو أحب شي «ممل» منعمله سوا؟"},{id:"r77",categoryId:"romance",text:"When did you realize you liked being known this well?",ar:"إيمتى اكتشفت إنك بتحب حدا يعرفك لهالدرجة؟"},{id:"r78",categoryId:"romance",text:"What's one dream date from your teenage years we could still do, ironically or not?",ar:"شو الموعد اللي كنت تحلم فيه أيام المراهقة وبعدنا منقدر نعمله، بمزح أو بجد؟"},{id:"r79",categoryId:"romance",text:"What's the warmest thing you've ever heard me say about you to someone else?",ar:"شو أدفى شي سمعتني قوله عنك لحدا تاني؟"},{id:"r80",categoryId:"romance",text:"Which of our songs should play at every milestone from now on?",ar:"أي أغنية من أغانينا لازم تشتغل بكل مناسبة مهمة من هلق ورايح؟"},{id:"r81",categoryId:"romance",text:"What's something I taught you about love without meaning to teach it?",ar:"شو الشي اللي علمتك ياه عن الحب بدون ما اقصد علمك؟"},{id:"r82",categoryId:"romance",text:"What's your favorite way we've celebrated something small?",ar:"شو أحلى طريقة احتفلنا فيها بشي زغير؟"},{id:"r83",categoryId:"romance",text:"If I whispered one sentence to you at a crowded party, what do you hope it is?",ar:"لو همستلك جملة وحدة بحفلة مليانة ناس، شو بتتمنى تكون؟"},{id:"r84",categoryId:"romance",text:"What's the most 'us' thing that happened this month?",ar:"شو أكتر شي «بيشبهنا» صار هالشهر؟"},{id:"r85",categoryId:"romance",text:"What detail about me do you hope you never forget, even at ninety?",ar:"شو التفصيلة فيني اللي بتتمنى ما تنساها أبدًا، حتى بعمر التسعين؟"},{id:"r86",categoryId:"romance",text:"What should I do more of: surprise flowers, surprise notes, or surprise plans?",ar:"شو لازم أعمل أكتر: ورد مفاجئ، رسايل مفاجئة، ولا خطط مفاجئة؟"},{id:"r87",categoryId:"romance",text:"What moment of ours would you replay in slow motion?",ar:"أي لحظة إلنا بتعيدها بحركة بطيئة؟"},{id:"r88",categoryId:"romance",text:"What's one promise you want us to make tonight — small enough to keep forever?",ar:"شو الوعد اللي بدك نقطعه الليلة — زغير لدرجة نقدر نحافظ عليه للأبد؟"},{id:"r89",categoryId:"romance",text:"How would you describe the way I look at you, in one sentence?",ar:"كيف بتوصف طريقة نظرتي إلك، بجملة وحدة؟"},{id:"r90",categoryId:"romance",text:"Last romance card: kiss now, answer questions later. 🌹",ar:"آخر بطاقة رومانسية: البوسة هلق، والأسئلة بعدين. 🌹"}],Fy=[{id:"f1",categoryId:"future",text:"What does a meaningful life look like to you ten years from now?",ar:"شو شكل الحياة اللي إلها معنى بالنسبة إلك بعد عشر سنين؟"},{id:"f2",categoryId:"future",text:"What's a goal you have that you'd love my support on?",ar:"شو الهدف اللي عندك وبتحب دعمي فيه؟"},{id:"f3",categoryId:"future",text:"How do you picture the two of us growing old?",ar:"كيف متخيلنا نحنا التنين ونحنا عم نكبر بالعمر؟"},{id:"f4",categoryId:"future",text:"What role does family — however we define it — play in your future?",ar:"شو دور العيلة — كيف ما عرفناها — بمستقبلك؟"},{id:"f5",categoryId:"future",text:"What's something you want to learn or try together this year?",ar:"شو الشي اللي بدك نتعلمه أو نجربه سوا هالسنة؟"},{id:"f6",categoryId:"future",text:"What does 'settling down' mean to you, if anything?",ar:"شو يعني «الاستقرار» بالنسبة إلك، إذا بيعني شي أصلًا؟"},{id:"f7",categoryId:"future",text:"If money weren't a factor, what would our life look like?",ar:"لو المصاري مش عامل، شو كان شكل حياتنا؟"},{id:"f8",categoryId:"future",text:"What traditions do you want us to build together?",ar:"شو التقاليد اللي بدك نبنيها سوا؟"},{id:"f9",categoryId:"future",text:"What's a version of yourself you're hoping to grow into?",ar:"شو النسخة من حالك اللي عم تطمح تصيرها؟"},{id:"f10",categoryId:"future",text:"How do you want us to handle big decisions as a team?",ar:"كيف بدك نتعامل مع القرارات الكبيرة كفريق؟"},{id:"nft1",categoryId:"future",text:"What's one adventure we absolutely must do in the next year?",ar:"شو المغامرة اللي لازم نعملها أكيد بالسنة الجاية؟"},{id:"nft2",categoryId:"future",text:"{B}, describe our home five years from now, room by room.",ar:"يا {B}، وصف بيتنا بعد خمس سنين، غرفة غرفة."},{id:"nft3",categoryId:"future",text:"What morning routine do you dream of us having together?",ar:"شو روتين الصباح اللي بتحلم نعيشه سوا؟"},{id:"nft4",categoryId:"future",text:"What fear about the future should we face as a team?",ar:"شو الخوف من المستقبل اللي لازم نواجهه سوا كفريق؟"},{id:"nft5",categoryId:"future",text:"If we wrote a bucket list tonight, what are your top three?",ar:"لو كتبنا لائحة أمنيات الليلة، شو أول تلاتة عندك؟"},{id:"nft6",categoryId:"future",text:"{G}, what kind of old couple do you hope we become?",ar:"يا {G}، أي نوع من الكبار بالعمر بتتمني نصير؟"},{id:"nft7",categoryId:"future",text:"What skill should we learn together — cooking, dancing, a language?",ar:"شو المهارة اللي لازم نتعلمها سوا — طبخ، رقص، لغة؟"},{id:"nft8",categoryId:"future",text:"Where do you want to wake up on our tenth anniversary?",ar:"وين بدك تفيق بعيدنا العاشر؟"},{id:"nft9",categoryId:"future",text:"What promise about the future are you ready to make right now?",ar:"شو الوعد عن المستقبل اللي جاهز تقطعه هلق؟"},{id:"nft10",categoryId:"future",text:"What does 'we made it' look like for us?",ar:'شو يعني "وصلنا" بالنسبة إلنا نحنا التنين؟'},{id:"f11",categoryId:"future",text:"Where do you picture us waking up on an ordinary day in ten years?",ar:"وين متخيلنا نصحى بيوم عادي بعد عشر سنين؟"},{id:"f12",categoryId:"future",text:"What's one skill you want us to learn together?",ar:"شو المهارة اللي بدك نتعلمها سوا؟"},{id:"f13",categoryId:"future",text:"City apartment, suburban house, or somewhere with land — what pulls you?",ar:"شقة بالمدينة، بيت بالضواحي، ولا مكان مع أرض — شو بيشدك؟"},{id:"f14",categoryId:"future",text:"What financial habit should we build now that our future selves will thank us for?",ar:"شو العادة المالية اللي لازم نبنيها هلق ورح تشكرنا عليها نسختنا المستقبلية؟"},{id:"f15",categoryId:"future",text:"What's on your bucket list that needs to happen in me word, what should it be?",ar:"لو سنتنا الجاية إلها كلمة شعار، شو لازم تكون؟"},{id:"f40",categoryId:"future",text:"What's the first thing we upgrade when money stops being tight?",ar:"شو أول شي منطوره لما المصاري تبطل ضيقة؟"},{id:"f41",categoryId:"future",text:"How do you want us to handle aging parents — talk me through your hopes?",ar:"كيف بدك نتعامل مع أهلنا لما يكبروا — احكيلي شو بتتمنى؟"},{id:"f42",categoryId:"future",text:"What's a fear about commitment you've already conquered with me?",ar:"شو الخوف من الالتزام اللي انتصرت عليه معي من قبل؟"},{id:"f43",categoryId:"future",text:"Describe our tenth anniversary — location, meal, and one surprise.",ar:"وصف عيد زواجنا العاشر — المكان والأكل ومفاجأة وحدة."},{id:"f44",categoryId:"future",text:"What hobby should we pick up now so we're amazing at it by fifty?",ar:"شو الهواية اللي لازم نبلشها هلق لنكون أبطال فيها بعمر الخمسين؟"},{id:"f45",categoryId:"future",text:"What kind of neighbors do you want us to be?",ar:"أي نوع جيران بدك نكون؟"},{id:"f46",categoryId:"future",text:"What should our home always smell like?",ar:"شو الريحة اللي لازم تكون ببيتنا دايمًا؟"},{id:"f47",categoryId:"future",text:"What's one thing you don't want us to postpone until 'someday'?",ar:"شو الشي اللي ما بدك نأجله لـ«يوم من الأيام»؟"},{id:"f48",categoryId:"future",text:"If we moved abroad for three years, where — and what makes us come back?",ar:"لو انتقلنا لبرا لتلات سنين، وين — وشو اللي بيرجعنا؟"},{id:"f49",categoryId:"future",text:"What do you hope we never argue about again by next year?",ar:"شو الشي اللي بتتمنى ما نتخانق عليه مرة تانية بحلول السنة الجاية؟"},{id:"f50",categoryId:"future",text:"Halfway card: high-five on one future plan you both just agreed on. Make it now.",ar:"بطاقة النص: هاي فايف على خطة مستقبلية وحدة اتفقتوا عليها هلق. يلا اتفقوا."},{id:"f51",categoryId:"future",text:"What season of life are you most looking forward to sharing with me?",ar:"أي مرحلة من مراحل الحياة متشوق تعيشها معي أكتر شي؟"},{id:"f52",categoryId:"future",text:"What's one thing about today-us that future-us will laugh at?",ar:"شو الشي فينا اليوم اللي نسختنا المستقبلية رح تضحك عليه؟"},{id:"f53",categoryId:"future",text:"What legacy — money aside — do you want us to leave?",ar:"شو الإرث — بعيدًا عن المصاري — اللي بدك نتركه نحنا التنين؟"},{id:"f54",categoryId:"future",text:"What's your plan for us during the next big world chaos: bunker, beach, or grandma's village?",ar:"شو خطتك إلنا بفوضى العالم الكبيرة الجاية: ملجأ، بحر، ولا ضيعة الستّ؟"},{id:"f55",categoryId:"future",text:"What personal goal of yours should I hold you accountable for?",ar:"شو هدفك الشخصي اللي لازم حاسبك عليه؟"},{id:"f56",categoryId:"future",text:"What's a car, trip, or gadget that's officially on our list now?",ar:"شو السيارة أو الرحلة أو الجهاز اللي رسميًا صار على قائمتنا هلق؟"},{id:"f57",categoryId:"future",text:"How many kids, pets, and plants can this partnership realistically sustain?",ar:"كم ولد وحيوان أليف ونبتة بتتحمل هالشراكة واقعيًا؟"},{id:"f58",categoryId:"future",text:"What do you want our Sunday mornings to look like in twenty years?",ar:"شو بدك يكون شكل صبحيات الأحد عنا بعد عشرين سنة؟"},{id:"f59",categoryId:"future",text:"What's one thing we should start saving for this month?",ar:"شو الشي اللي لازم نبلش نوفرله من هالشهر؟"},{id:"f60",categoryId:"future",text:"Who do we call when we finally make the big announcement — and which announcement is it?",ar:"بمين منتصل لما نعلن الخبر الكبير أخيرًا — وأي خبر هو أصلًا؟"},{id:"f61",categoryId:"future",text:"What's a skill you'll teach our future kid — real or hypothetical?",ar:"شو المهارة اللي رح تعلمها لولدنا المستقبلي — الحقيقي أو الافتراضي؟"},{id:"f62",categoryId:"future",text:"What should we do every single year, no matter what?",ar:"شو الشي اللي لازم نعمله كل سنة، مهما صار؟"},{id:"f63",categoryId:"future",text:"What kind of hosts do we become: dinner parties, game nights, or open-door chaos?",ar:"أي نوع مضيفين رح نصير: عزايم عشا، سهرات ألعاب، ولا بيت مفتوح عالفوضى؟"},{id:"f64",categoryId:"future",text:"What's one way you want us to give back together someday?",ar:"شو الطريقة اللي بدك نرد فيها الجميل للناس سوا بيوم من الأيام؟"},{id:"f65",categoryId:"future",text:"What scares you about us succeeding — if anything?",ar:"شو بيخوفك من نجاحنا — إذا في شي أصلًا؟"},{id:"f66",categoryId:"future",text:"Which dream of mine do you secretly plan to help me get?",ar:"أي حلم من أحلامي ناوي بالسر تساعدني حققه؟"},{id:"f67",categoryId:"future",text:"What's our five-year plan in exactly five words?",ar:"شو خطتنا الخمسية بخمس كلمات بالضبط؟"},{id:"f68",categoryId:"future",text:"Where should we plant roots, and where should we keep wings?",ar:"وين لازم نزرع جذور، ووين لازم نخلي أجنحة؟"},{id:"f69",categoryId:"future",text:"What conversation about the future have we been postponing?",ar:"شو الحديث عن المستقبل اللي عم نأجله؟"},{id:"f70",categoryId:"future",text:"What's one thing you want to build with your own hands for our home?",ar:"شو الشي اللي بدك تبنيه بإيديك لبيتنا؟"},{id:"f71",categoryId:"future",text:"How will we protect date night when life gets loud?",ar:"كيف رح نحمي سهرتنا الأسبوعية لما الحياة تعلى ضجتها؟"},{id:"f72",categoryId:"future",text:"What's the first tradition from tonight we're keeping forever?",ar:"شو أول تقليد من الليلة رح نحتفظ فيه للأبد؟"},{id:"f73",categoryId:"future",text:"What would make you feel like the luckiest person alive at seventy?",ar:"شو بيخليك تحس إنك أكتر إنسان محظوظ بالدنيا بعمر السبعين؟"},{id:"f74",categoryId:"future",text:"What's one thing about the world you hope is fixed before our kids see it?",ar:"شو الشي بالعالم اللي بتتمنى ينصلح قبل ما يشوفه ولادنا؟"},{id:"f75",categoryId:"future",text:"If we get one guaranteed 'yes' from the universe, what do we spend it on?",ar:"لو الكون ضمنلنا «نعم» وحدة، على شو منصرفها؟"},{id:"f76",categoryId:"future",text:"What's your favorite thing about imagining the future with me specifically?",ar:"شو أحب شي بتخيل المستقبل معي أنا بالذات؟"},{id:"f77",categoryId:"future",text:"What should we name our future boat, cabin, or food truck — pick your fantasy?",ar:"شو منسمي مركبنا أو كوخنا أو عربية أكلنا المستقبلية — اختار الفانتازيا؟"},{id:"f78",categoryId:"future",text:"What's one habit we should quit together before it follows us into next year?",ar:"شو العادة اللي لازم نبطلها سوا قبل ما تلحقنا عالسنة الجاية؟"},{id:"f79",categoryId:"future",text:"How do we make sure we're still dating each other at eighty?",ar:"كيف منتأكد إنا لسا عم نتواعد ببعمر الثمانين؟"},{id:"f80",categoryId:"future",text:"What's the boldest version of our future you can imagine out loud right now?",ar:"شو أجرأ نسخة من مستقبلنا فيك تتخيلها بصوت عالي هلق؟"},{id:"f81",categoryId:"future",text:"What little luxury should future-us never skip?",ar:"شو الرفاهية الزغيرة اللي نسختنا المستقبلية ما لازم تستغنى عنها أبدًا؟"},{id:"f82",categoryId:"future",text:"Which city do we grow old in — final answer?",ar:"بأي مدينة منكبر بالعمر — الجواب النهائي؟"},{id:"f83",categoryId:"future",text:"What do you want written on our kitchen wall someday?",ar:"شو بدك يكون مكتوب على حيط مطبخنا بيوم من الأيام؟"},{id:"f84",categoryId:"future",text:"What's one thing we should photograph every year in the same spot?",ar:"شو الشي اللي لازم نصوره كل سنة بنفس المكان؟"},{id:"f85",categoryId:"future",text:"What role does faith or meaning play in the home we're building?",ar:"شو دور الإيمان أو المعنى بالبيت اللي عم نبنيه؟"},{id:"f86",categoryId:"future",text:"What's the most important thing money can't get us — and how do we protect it?",ar:"شو أهم شي المصاري ما بتجيبه إلنا — وكيف منحميه؟"},{id:"f87",categoryId:"future",text:"When we tell our story decades from now, which part gets exaggerated?",ar:"لما نخبر قصتنا بعد عقود، أي جزء رح ينبالغ فيه؟"},{id:"f88",categoryId:"future",text:"What's your dream for me that I don't dream for myself yet?",ar:"شو حلمك إلي أنا اللي لسا ما بحلمه لحالي؟"},{id:"f89",categoryId:"future",text:"What's the next chapter's title for us, starting tomorrow?",ar:"شو عنوان الفصل الجاي إلنا، ابتداءً من بكرا؟"},{id:"f90",categoryId:"future",text:"Last future card: pick a date within a month and plan one small dream. Calendar. Now. 🔮",ar:"آخر بطاقة مستقبل: حددوا تاريخ خلال شهر وخططوا حلم زغير واحد. الأجندة. هلق. 🔮"}],Hy=[{id:"t1",categoryId:"trust",text:"What helps you feel safe enough to be fully honest with someone?",ar:"شو اللي بيساعدك تحس بأمان كافي لتكون صريح بالكامل مع حدا؟"},{id:"t2",categoryId:"trust",text:"Is there something you've been meaning to tell me but haven't found the moment?",ar:"في شي ناوي تخبرني ياه من زمان وما لقيت اللحظة المناسبة؟"},{id:"t3",categoryId:"trust",text:"What's a moment you felt truly seen by me?",ar:"شو اللحظة اللي حسيت فيها إني شايفك عن جد؟"},{id:"t4",categoryId:"trust",text:"What does trust look like to you, day to day?",ar:"شو شكل الثقة بالنسبة إلك، بالحياة اليومية؟"},{id:"t5",categoryId:"trust",text:"What's something you're insecure about that I could help ease?",ar:"شو الشي اللي حاسس بعدم أمان تجاهه وفيني ساعدك تخف منه؟"},{id:"t6",categoryId:"trust",text:"When was the last time you cried, and would you tell me why?",ar:"إيمتى آخر مرة بكيت، وبتخبرني ليش؟"},{id:"t7",categoryId:"trust",text:"What's a part of yourself you're still learning to accept?",ar:"شو الجزء من حالك اللي لسا عم تتعلم تتقبله؟"},{id:"t8",categoryId:"trust",text:"How can I best support you when you're struggling but don't want to talk?",ar:"كيف فيني ادعمك أحسن شي لما تكون تعبان وما بدك تحكي؟"},{id:"t9",categoryId:"trust",text:"What's something you appreciate about me that you don't say enough?",ar:"شو الشي اللي بتقدره فيي وما بتقوله كفاية؟"},{id:"t10",categoryId:"trust",text:"What would make you feel even closer to me than you already do?",ar:"شو اللي بيخليك تحس إنك أقرب إلي من هلق كمان؟"},{id:"ntr1",categoryId:"trust",text:"What's the bravest thing you've ever told me?",ar:"شو أشجع شي حكيتلي ياه بحياتك؟"},{id:"ntr2",categoryId:"trust",text:"{G}, when did you last feel completely safe — and where was I?",ar:"يا {G}، إيمتى آخر مرة حسيتي بأمان كامل — ووين كنت أنا؟"},{id:"ntr3",categoryId:"trust",text:"What do you pretend doesn't bother you, but it does?",ar:"شو الشي اللي بتتظاهر إنه ما بيضايقك بس بالحقيقة مضايقك؟"},{id:"ntr4",categoryId:"trust",text:"How do you want me to react when you share something hard?",ar:"كيف بدك ياني أتصرف لما تشاركني شي صعب؟"},{id:"ntr5",categoryId:"trust",text:"{B}, what's one thing you've never apologized for but want to now?",ar:"يا {B}، شو الشي اللي عمرك ما اعتذرت عنه وبدك تعتذر هلق؟"},{id:"ntr6",categoryId:"trust",text:"What secret dream feels safer now that we're together?",ar:"شو الحلم السري اللي صار أأمن هلق لأننا سوا؟"},{id:"ntr7",categoryId:"trust",text:"When have I surprised you with how well I know you?",ar:"إيمتى فاجأتك بقديش بعرفك منيح؟"},{id:"ntr8",categoryId:"trust",text:"What small breach of trust — anywhere in life — still stings?",ar:"شو خيانة الثقة الصغيرة — بأي مكان بحياتك — اللي لسا بتوجع؟"},{id:"ntr9",categoryId:"trust",text:"What would you want me to do if you were quiet for a whole day?",ar:"شو بتحب أعمل لو ضليت ساكت يوم كامل؟"},{id:"ntr10",categoryId:"trust",text:"What truth about you gets easier to say each time?",ar:"شو الحقيقة عنك اللي عم تصير أسهل كل ما تقولها؟"},{id:"t11",categoryId:"trust",text:"What's the scariest thing about being fully known by someone?",ar:"شو أخوف شي بإنو حدا يعرفك بالكامل؟"},{id:"t12",categoryId:"trust",text:"When did you first trust me with something real?",ar:"إيمتى أول مرة أمّنتني على شي حقيقي؟"},{id:"t13",categoryId:"trust",text:"What do you need to hear when you're doubting yourself?",ar:"شو بتحتاج تسمع لما تشك بحالك؟"},{id:"t14",categoryId:"trust",text:"What's a secret hope you have for us that feels too big to say?",ar:"شو الأمل السري اللي عندك إلنا وحاسس إنه أكبر من إنه ينحكى؟"},{id:"t15",categoryId:"trust",text:"What part of your past are you afraid changes how I see you?",ar:"أي جزء من ماضيك خايف يغير نظرتي إلك؟"},{id:"t16",categoryId:"trust",text:"When do you feel safest with me — a specific moment or place?",ar:"إيمتى بتحس بأمان معي أكتر شي — لحظة أو مكان محدد؟"},{id:"t17",categoryId:"trust",text:"What's something you want to be loved through, not despite?",ar:"شو الشي اللي بدك حدا يحبك وهو عم يعيشه معك، مش رغمًا عنه؟"},{id:"t18",categoryId:"trust",text:"What did betrayal teach you about what you need?",ar:"شو علمتك الخيانة عن اللي بتحتاجه؟"},{id:"t19",categoryId:"trust",text:"What's one fear about us you've never said out loud?",ar:"شو الخوف الواحد عنا اللي عمرك ما قلته بصوت عالي؟"},{id:"t20",categoryId:"trust",text:"How do you rebuild trust once it cracks — slowly, suddenly, or never?",ar:"كيف بترجع تبني الثقة بعد ما تنكسر — ببطء، فجأة، ولا أبدًا؟"},{id:"t21",categoryId:"trust",text:"What's something you've told me that you've never told anyone else?",ar:"شو الشي اللي خبرتني ياه وعمرك ما خبرته لحدا غيري؟"},{id:"t22",categoryId:"trust",text:"What do you do with feelings you don't want me to see?",ar:"شو بتعمل بالمشاعر اللي ما بدك ياني شوفها؟"},{id:"t23",categoryId:"trust",text:"When was the last time you felt jealous and didn't say it?",ar:"إيمتى آخر مرة غرت وما قلت؟"},{id:"t24",categoryId:"trust",text:"What's one way I could make honesty easier for you?",ar:"شو الطريقة اللي فيني سهّل فيها الصراحة عليك؟"},{id:"t25",categoryId:"trust",text:"What compliment do you secretly hope I mean the most?",ar:"شو المديح اللي بتتمنى بالسر إني أعنيه أكتر شي؟"},{id:"t26",categoryId:"trust",text:"What's harder for you: asking for help or accepting it?",ar:"شو أصعب عليك: تطلب المساعدة ولا تقبلها؟"},{id:"t27",categoryId:"trust",text:"What's a moment I hurt you that I might not know about?",ar:"شو اللحظة اللي جرحتك فيها ويمكن ما بعرف عنها؟"},{id:"t28",categoryId:"trust",text:"What does loyalty mean to you in everyday actions, not big words?",ar:"شو يعني الوفا إلك بالأفعال اليومية، مش بالكلام الكبير؟"},{id:"t29",categoryId:"trust",text:"What would you want me to do if you ever pushed me away?",ar:"شو بدك ياني أعمل لو بيوم من الأيام دفشتني بعيد عنك؟"},{id:"t30",categoryId:"trust",text:"Which of your walls came down first with me? Which is still up?",ar:"أي جدار من جدرانك وقع أول معي؟ وأي واحد لسا واقف؟"},{id:"t31",categoryId:"trust",text:"What's something you rehearse saying to me but haven't yet?",ar:"شو الشي اللي بتتمرن تقوله إلي وبعدك ما قلته؟"},{id:"t32",categoryId:"trust",text:"How do you want me to hold your secrets — mentioned sometimes, or never again?",ar:"كيف بدك ياني احمل أسرارك — نذكرها أحيانًا، ولا ولا مرة تانية؟"},{id:"t33",categoryId:"trust",text:"What's a way someone broke your trust that you're still careful about?",ar:"شو الطريقة اللي كسر فيها حدا ثقتك وبعدك واخد حذرك منها؟"},{id:"t34",categoryId:"trust",text:"When do you trust yourself the most? The least?",ar:"إيمتى بتثق بحالك أكتر شي؟ وأقل شي؟"},{id:"t35",categoryId:"trust",text:"What's one thing you want me to always tell you the truth about, even if it stings?",ar:"شو الشي اللي بدك ياني دايمًا قلك الحقيقة فيه، حتى لو بتوجع؟"},{id:"t36",categoryId:"trust",text:"What insecurity have you outgrown that you're proud of?",ar:"شو نقطة الضعف اللي تجاوزتها وفخور بهالشي؟"},{id:"t37",categoryId:"trust",text:"What does it mean to you when I stay quiet with you?",ar:"شو بيعنيلك لما اسكت معك بلا حكي؟"},{id:"t38",categoryId:"trust",text:"Who saw you cry last, before me?",ar:"مين آخر واحد شافك عم تبكي، قبلي؟"},{id:"t39",categoryId:"trust",text:"What's something you protect me from that I probably don't notice?",ar:"شو الشي اللي بتحميني منه وغالبًا ما بنتبهله؟"},{id:"t40",categoryId:"trust",text:"What's your first instinct when you're hurt: talk, hide, or joke?",ar:"شو أول غريزة عندك لما تنجرح: تحكي، تختفي، ولا تمزح؟"},{id:"t41",categoryId:"trust",text:"How can I love you better on your worst days?",ar:"كيف فيني حبك أحسن بأسوأ أيامك؟"},{id:"t42",categoryId:"trust",text:"What's a promise you're afraid to make because you take promises seriously?",ar:"شو الوعد اللي خايف تقطعه لأنك بتاخد الوعود على محمل الجد؟"},{id:"t43",categoryId:"trust",text:"What do you need more of from me: reassurance, space, honesty, or presence?",ar:"شو بتحتاج مني أكتر: طمأنة، مساحة، صراحة، ولا وجودي حدك؟"},{id:"t44",categoryId:"trust",text:"What's the most vulnerable thing you've ever done for love?",ar:"شو أكتر شي كشفت فيه ضعفك عشان الحب؟"},{id:"t45",categoryId:"trust",text:"When you imagine trusting me completely, what's the last step you haven't taken?",ar:"لما تتخيل إنك واثق فيي بالكامل، شو آخر خطوة لسا ما خطيتها؟"},{id:"t46",categoryId:"trust",text:"What's something about your body or health you've been quiet about?",ar:"شو الشي عن جسمك أو صحتك اللي ساكت عنه؟"},{id:"t47",categoryId:"trust",text:"What would you tell me if you knew I wouldn't worry?",ar:"شو كنت رح تخبرني لو متأكد إني ما رح اقلق؟"},{id:"t48",categoryId:"trust",text:"How did the people who raised you handle secrets?",ar:"كيف كانوا يتعاملوا مع الأسرار الناس اللي ربوك؟"},{id:"t49",categoryId:"trust",text:"What's one assumption about you that you're tired of correcting?",ar:"شو الافتراض عنك اللي تعبت من تصحيحه؟"},{id:"t50",categoryId:"trust",text:"Halfway card: say one sentence you've been holding since this deck started.",ar:"بطاقة النص: قول جملة وحدة ماسكها من أول ما بلشت هالخانة."},{id:"t51",categoryId:"trust",text:"What's your tell when you're lying — and do I know it yet?",ar:"شو علامتك لما تكذب — وهل اكتشفتها أنا؟"},{id:"t52",categoryId:"trust",text:"What part of being loved do you find hardest to receive?",ar:"شو الجزء من الحب اللي بتلاقيه أصعب شي تستقبله؟"},{id:"t53",categoryId:"trust",text:"What's a fear you inherited that isn't really yours?",ar:"شو الخوف اللي ورثته وهو أصلًا مش خوفك؟"},{id:"t54",categoryId:"trust",text:"When have you felt most defended by me?",ar:"إيمتى حسيت إني وقفت بوجه العالم عشانك أكتر شي؟"},{id:"t55",categoryId:"trust",text:"What's something you wish you could un-hear or un-see?",ar:"شو الشي اللي بتتمنى لو فيك تلغي إنك سمعته أو شفته؟"},{id:"t56",categoryId:"trust",text:"What would make you feel safe telling me 'I'm not okay'?",ar:"شو بيخليك تحس بأمان لتقلي «أنا مش منيح»؟"},{id:"t57",categoryId:"trust",text:"What's one thing you don't want to be brave about anymore?",ar:"شو الشي اللي ما عاد بدك تكون شجاع فيه؟"},{id:"t58",categoryId:"trust",text:"What kind of silence between us feels comfortable, and what kind feels heavy?",ar:"أي سكوت بيناتنا مريح، وأي سكوت تقيل؟"},{id:"t59",categoryId:"trust",text:"Whose opinion of you still has too much power?",ar:"رأي مين فيك لسا إله سلطة أكتر من اللازم؟"},{id:"t60",categoryId:"trust",text:"What do you wish I understood about your family without you explaining?",ar:"شو بتتمنى إني افهمه عن عيلتك بدون ما تشرح؟"},{id:"t61",categoryId:"trust",text:"What's the gentlest way someone ever corrected you?",ar:"شو ألطف طريقة صحح فيها حدا غلطك؟"},{id:"t62",categoryId:"trust",text:"When did you last feel truly forgiven?",ar:"إيمتى آخر مرة حسيت إنك متسامح عن جد؟"},{id:"t63",categoryId:"trust",text:"What's something you've never let anyone help you with?",ar:"شو الشي اللي عمرك ما خليت حدا يساعدك فيه؟"},{id:"t64",categoryId:"trust",text:"What do you hope I never find out you worried about?",ar:"شو بتتمنى ما اكتشف أبدًا إنك كنت قلقان منه؟"},{id:"t65",categoryId:"trust",text:"How do you want to be told hard news?",ar:"كيف بتحب توصلك الأخبار الصعبة؟"},{id:"t66",categoryId:"trust",text:"What's a moment you almost gave up on us — if there was one?",ar:"شو اللحظة اللي كنت ع وشك تستسلم فيها عنا — إذا كان في وحدة؟"},{id:"t67",categoryId:"trust",text:"What's the difference between privacy and secrecy, for you?",ar:"شو الفرق بين الخصوصية والتخبئة، بالنسبة إلك؟"},{id:"t68",categoryId:"trust",text:"What do you need me to stop assuming about you?",ar:"شو بدك ياني بطّل افترضه عنك؟"},{id:"t69",categoryId:"trust",text:"What's a soft spot of yours that you disguise as a strong opinion?",ar:"شو نقطة ضعفك اللي بتلبسها لبوس رأي قوي؟"},{id:"t70",categoryId:"trust",text:"When do you feel like a burden — and can I tell you why you're not?",ar:"إيمتى بتحس حالك عبء — وبتسمحلي قلك ليش إنت مش هيك؟"},{id:"t71",categoryId:"trust",text:"What's the most trust you've ever put in one person, and how did it go?",ar:"شو أكبر ثقة حطيتها بشخص واحد بحياتك، وكيف مشيت؟"},{id:"t72",categoryId:"trust",text:"What would you want me to do with your journal, your drafts, your unfinished things?",ar:"شو بدك ياني أعمل بدفاترك ومسوداتك وأشياءك الناقصة؟"},{id:"t73",categoryId:"trust",text:"What's one thing you'd confess right now if I promised to just listen?",ar:"شو الشي اللي رح تعترف فيه هلق لو وعدتك بس اسمع؟"},{id:"t74",categoryId:"trust",text:"What did you learn about trust from your first heartbreak?",ar:"شو تعلمت عن الثقة من أول انكسار قلب؟"},{id:"t75",categoryId:"trust",text:"Which is scarier: being misunderstood or being fully understood?",ar:"شو أخوف: يفهموك غلط ولا يفهموك بالكامل؟"},{id:"t76",categoryId:"trust",text:"What part of your day do you wish I could witness?",ar:"أي جزء من يومك بتتمنى لو فيني احضره؟"},{id:"t77",categoryId:"trust",text:"What's something you want us to never joke about?",ar:"شو الشي اللي بدك ما نمزح عليه أبدًا؟"},{id:"t78",categoryId:"trust",text:"How do you know when you've truly forgiven someone?",ar:"كيف بتعرف إنك سامحت حدا عن جد؟"},{id:"t79",categoryId:"trust",text:"What's a kindness you find hard to believe you deserve?",ar:"شو اللطف اللي بتصعب عليك تصدق إنك بتستاهله؟"},{id:"t80",categoryId:"trust",text:"What's the safest you've ever felt in your life — and are we close to it?",ar:"شو أكتر أمان حسيته بحياتك — وقديش نحنا قراب منه؟"},{id:"t81",categoryId:"trust",text:"What do you want me to remember during your hardest season?",ar:"شو بدك ياني اتذكر بأصعب فتراتك؟"},{id:"t82",categoryId:"trust",text:"What's one way you test people without them knowing?",ar:"شو الطريقة اللي بتختبر فيها الناس بدون ما يعرفوا؟"},{id:"t83",categoryId:"trust",text:"What would total honesty between us look like tomorrow morning?",ar:"شو رح يكون شكل الصراحة الكاملة بيناتنا بكرا الصبح؟"},{id:"t84",categoryId:"trust",text:"What's a wound that quietly healed because of us?",ar:"شو الجرح اللي تعافى بصمت بسببنا نحنا؟"},{id:"t85",categoryId:"trust",text:"What's something you believe about me that you've never verified — just trusted?",ar:"شو الشي اللي بتصدقه عني وعمرك ما تأكدت منه — بس وثقت؟"},{id:"t86",categoryId:"trust",text:"What do you never want me to apologize for again?",ar:"شو الشي اللي ما بدك اعتذر عنه مرة تانية أبدًا؟"},{id:"t87",categoryId:"trust",text:"When you're old, what do you hope we still confide in each other?",ar:"لما نكبر، شو بتتمنى نضل نتسارر فيه لبعض؟"},{id:"t88",categoryId:"trust",text:"What's one thing about us you'd defend against anyone?",ar:"شو الشي الواحد عنا اللي رح تدافع عنه بوج أي حدا؟"},{id:"t89",categoryId:"trust",text:"What made you decide I was safe?",ar:"شو خلاك تقرر إني أمان؟"},{id:"t90",categoryId:"trust",text:"Last trust card: look at me and say the thing. I'm ready.",ar:"آخر بطاقة ثقة: طلع فيي وقول الشي. أنا جاهز."}],Uy=[{id:"c1",categoryId:"conflict",text:"How do you like to resolve disagreements — talk right away, or take space first?",ar:"كيف بتحب نحل الخلافات — نحكي فورًا، ولا ناخد مساحة أول؟"},{id:"c2",categoryId:"conflict",text:"What's something I do during an argument that helps, and something that doesn't?",ar:"شو الشي اللي بعمله وقت الخناق وبيساعد، وشو اللي ما بيساعد؟"},{id:"c3",categoryId:"conflict",text:"How did your family handle conflict growing up, and how does that show up in you now?",ar:"كيف كانت عيلتك تتعامل مع الخلاف وإنت زغير، وكيف بيبين هالشي فيك هلق؟"},{id:"c4",categoryId:"conflict",text:"What's a disagreement we've had that actually made us stronger?",ar:"شو الخلاف اللي صار بيناتنا وفعليًا قوانا؟"},{id:"c5",categoryId:"conflict",text:"How do you prefer to receive feedback or criticism from me?",ar:"كيف بتفضل توصلك ملاحظاتي أو انتقاداتي؟"},{id:"c6",categoryId:"conflict",text:"What's something you need to hear after we've had a fight?",ar:"شو الشي اللي بتحتاج تسمعه بعد ما نتخانق؟"},{id:"c7",categoryId:"conflict",text:"Is there a recurring disagreement we should talk through outside of the heat of the moment?",ar:"في خلاف متكرر لازم نحكيه بهدوء بعيد عن لحظة التوتر؟"},{id:"c8",categoryId:"conflict",text:"How do you know when I'm upset, even if I haven't said anything?",ar:"كيف بتعرف إني مضايق، حتى لو ما حكيت شي؟"},{id:"c9",categoryId:"conflict",text:"What boundary do you have that you want me to understand better?",ar:"شو الحد اللي عندك وبدك ياني افهمه أحسن؟"},{id:"c10",categoryId:"conflict",text:"What's one thing we could do to communicate even better as a team?",ar:"شو الشي الواحد اللي فينا نعمله لنتواصل أحسن كفريق؟"},{id:"ncf1",categoryId:"conflict",text:"What small thing do I do that defuses you instantly mid-argument?",ar:"شو الشي الصغير اللي بعمله وبيهدّيك فورًا وسط النقاش؟"},{id:"ncf2",categoryId:"conflict",text:"{B}, what do you actually need when you go quiet?",ar:"يا {B}، شو بتكون محتاج فعلًا لما بتسكت؟"},{id:"ncf3",categoryId:"conflict",text:"What fight do we laugh about now?",ar:"شو الخناقة اللي منضحك عليها هلق؟"},{id:"ncf4",categoryId:"conflict",text:"How should we handle disagreements in front of other people?",ar:"كيف لازم نتعامل مع خلافنا قدام الناس؟"},{id:"ncf5",categoryId:"conflict",text:"What sentence should be banned from our arguments?",ar:"شو الجملة اللي لازم تنمنع من نقاشاتنا؟"},{id:"ncf6",categoryId:"conflict",text:"{G}, how do you know {B} is sorry, even before he says it?",ar:"يا {G}، كيف بتعرفي إنو {B} ندمان حتى قبل ما يحكي؟"},{id:"ncf7",categoryId:"conflict",text:"What's our best 'repair move' after a hard conversation?",ar:"شو أحسن طريقة منرجع فيها لبعض بعد حديث صعب؟"},{id:"ncf8",categoryId:"conflict",text:"When you're stressed, what do you wish I understood without explaining?",ar:"لما تكون مضغوط، شو بتتمنى إفهمه بلا ما تشرح؟"},{id:"ncf9",categoryId:"conflict",text:"What topic do we avoid that deserves ten calm minutes tonight?",ar:"شو الموضوع اللي منتهرب منه وبيستاهل عشر دقايق هادية الليلة؟"},{id:"ncf10",categoryId:"conflict",text:"What do you appreciate about how I argue fairly?",ar:"شو الشي اللي بتقدّره بطريقتي بالنقاش العادل؟"},{id:"c11",categoryId:"conflict",text:"What do you actually need in e apologized for that still needs one more conversation?",ar:"شو الشي اللي اعتذرت عنه وبعده محتاج جلسة حكي كمان وحدة؟"},{id:"c24",categoryId:"conflict",text:"When we disagree in public, what's our rule?",ar:"لما نختلف قدام الناس، شو قاعدتنا؟"},{id:"c25",categoryId:"conflict",text:"What percentage of our arguments are about logistics vs. feelings? Estimate.",ar:"قديش نسبة خناقاتنا عن تفاصيل عملية مقابل مشاعر؟ خمّن."},{id:"c26",categoryId:"conflict",text:"What's the kindest thing you've done for me mid-argument?",ar:"شو ألطف شي عملته معي بنص الخناقة؟"},{id:"c27",categoryId:"conflict",text:"What do you wish I understood about how you process anger?",ar:"شو بتتمنى افهمه عن طريقتك بهضم الغضب؟"},{id:"c28",categoryId:"conflict",text:"What's a criticism that would be fair for you to give me right now?",ar:"شو النقد العادل اللي من حقك توجهه إلي هلق؟"},{id:"c29",categoryId:"conflict",text:"How should we bring up money without it becoming a thing?",ar:"كيف لازم نفتح موضوع المصاري بدون ما يتحول لمشكلة؟"},{id:"c30",categoryId:"conflict",text:"What's your least favorite way to be interrupted?",ar:"شو أكره طريقة حدا يقاطعك فيها؟"},{id:"c31",categoryId:"conflict",text:"After we fight, do you want to talk about the fight, or just be okay again?",ar:"بعد ما نتخانق، بدك نحكي عن الخناقة، ولا بس نرجع منيحين؟"},{id:"c32",categoryId:"conflict",text:"What's one thing you've never said during a fight because it felt too unfair to use?",ar:"شو الشي اللي عمرك ما قلته وقت الخناق لأنك حسيت استعماله ظلم؟"},{id:"c33",categoryId:"conflict",text:"When am I most convincing — and when am I just louder?",ar:"إيمتى بكون مقنع فعلًا — وإيمتى بس صوتي أعلى؟"},{id:"c34",categoryId:"conflict",text:"What recurring chore or habit argument should we solve with a system tonight?",ar:"شو الخناقة المتكررة عن شغل البيت أو العادات اللي لازم نحلها بنظام الليلة؟"},{id:"c35",categoryId:"conflict",text:"How do you feel about texting during a conflict — helpful or dangerous?",ar:"شو رأيك بالحكي بالرسايل وقت الخلاف — بيسا  اللعبة خلصت. بس الليلة لسا ما خلصت. 🔥"}],Qy=Vy.map(({id:e,text:t,ar:r})=>({id:e,categoryId:"dares",text:t,ar:r})),Ky=[{id:"de1",categoryId:"dares",text:"Behind this door: no small talk. What's the one desire you've never said out loud to anyone — including me?",ar:"ورا هالباب: ممنوع الحكي السطحي. شو الرغبة الوحيدة اللي عمرك ما قلتها بصوت عالي لحدا — ولا حتى إلي؟"},{id:"de2",categoryId:"dares",text:"What's the most forbidden-feeling thought you've ever had about me? You opened this deck, so you have to answer.",ar:"شو أكتر فكرة «ممنوعة» خطرتلك عني؟ فتحت هالخانة، يعني لازم تجاوب."},{id:"de3",categoryId:"dares",text:"Confess: what's something you've imagined us doing that you were sure I'd say no to?",ar:"اعترف: شو الشي اللي تخيلتنا منعمله وكنت متأكد إني رح قول لأ؟"},{id:"de4",categoryId:"dares",text:"If nothing we said in this room ever left it, what would you ask me for right now?",ar:"لو كل شي منقوله بهالغرفة بيضل فيها للأبد، شو كنت رح تطلب مني هلق؟"},{id:"de5",categoryId:"dares",text:"What's a side of you — bold, demanding, shameless — that you've never fully let me see?",ar:"شو الجانب منك — الجريء، المتطلب، اللي ما بيستحي — اللي عمرك ما فرجيتني ياه بالكامل؟"},{id:"de6",categoryId:"dares",text:"Tell me about the last time you wanted me so badly it was hard to act normal. Every detail.",ar:"خبرني عن آخر مرة اشتهيتني فيها لدرجة صعب عليك تتصرف طبيعي. بكل التفاصيل."},{id:"de7",categoryId:"dares",text:"What's the one thing I could do tonight that you'd never admit to wanting — until now?",ar:"شو الشي الوحيد اللي فيني اعمله الليلة وعمرك ما رح تعترف إنك بدك ياه — لهلق؟"},{id:"de8",categoryId:"dares",text:"You get one 'no rules' request, redeemable tonight. Say it out loud. No taking it back.",ar:"إلك طلب واحد «بلا قواعد» بتصرفه الليلة. قوله بصوت عالي. وما في تراجع."},{id:"de9",categoryId:"dares",text:"What's the most daring place you'd actually go through with being intimate — not fantasy, for real?",ar:"شو أجرأ مكان فعلًا مستعد نكون فيه حميمين — مش خيال، عن جد؟"},{id:"de10",categoryId:"dares",text:"If I could read your mind for one minute during our most heated moment, what would I hear?",ar:"لو فيني اقرا أفكارك لدقيقة وحدة بأكتر لحظاتنا اشتعالًا، شو رح اسمع؟"},{id:"de11",categoryId:"dares",text:"What's a line you used to think you'd never cross — that you'd cross with me?",ar:"شو الخط اللي كنت مفكر عمرك ما رح تتجاوزه — وبتتجاوزه معي؟"},{id:"de12",categoryId:"dares",text:"Describe the version of tonight you'd plan if you knew I couldn't say no to anything reasonable.",ar:"وصف نسخة الليلة اللي كنت رح تخطط إلها لو بتعرف إني ما فيني قول لأ لأي شي معقول."},{id:"de13",categoryId:"dares",text:"What's the hungriest you've ever felt for me — and what triggered it?",ar:"شو أكتر جوع حسيته تجاهي — وشو اللي شغّله؟"},{id:"de14",categoryId:"dares",text:"If we made one secret rule that only exists between us, what should it be?",ar:"لو عملنا قاعدة سرية وحدة موجودة بس بيناتنا، شو لازم تكون؟"},{id:"de15",categoryId:"dares",text:"What do you want me to do the second this card is over? Be specific. Be shameless.",ar:"شو بدك ياني اعمل ثاني ما تخلص هالبطاقة؟ كون محدد. وبلا خجل."},{id:"de16",categoryId:"dares",text:"What's a word or phrase you'd love to hear me say in your ear that you'd be embarrassed to request?",ar:"شو الكلمة أو الجملة اللي بتموت تسمعني قولها بأذنك بس بتستحي تطلبها؟"},{id:"de17",categoryId:"dares",text:"Confession round: what's the boldest thing you've almost done with me in public?",ar:"جولة الاعترافات: شو أجرأ شي كنت ع وشك تعمله معي قدام الناس؟"},{id:"de18",categoryId:"dares",text:"If tonight had no clock, no phone, and no tomorrow morning — walk me through hour one.",ar:"لو الليلة بلا ساعة وبلا موبايل وبلا صبح بكرا — خدني بأول ساعة خطوة خطوة."},{id:"de19",categoryId:"dares",text:"What's something you've wanted to try that you were afraid would sound 'too much'? This deck exists for exactly that.",ar:"شو الشي اللي حابب تجربه وخفت يبين «كتير»؟ هالخانة موجودة تحديدًا لهيك أشيا."},{id:"de20",categoryId:"dares",text:"Who's in charge tonight — you or me? Claim it out loud, and back it up.",ar:"مين الماسك القيادة الليلة — إنت ولا أنا؟ اعلنها بصوت عالي، وثبتها بأفعالك."},{id:"de21",categoryId:"dares",text:"What's the one memory of us you replay when you're alone? Don't summarize. Narrate it.",ar:"شو الذكرى الوحيدة إلنا اللي بتعيد تشغيلها لما تكون لحالك؟ لا تلخص. احكيها متل الفيلم."},{id:"de22",categoryId:"dares",text:"If I dared you to show me instead of tell me — right now — what would you show me?",ar:"لو تحديتك تفرجيني بدل ما تخبرني — هلق فورًا — شو رح تفرجيني؟"},{id:"de23",categoryId:"dares",text:"What's a 'we shouldn't' that you secretly hope I'll talk you into?",ar:"شو الـ«ما لازم» اللي بالسر متأمل إني اقنعك فيه؟"},{id:"de24",categoryId:"dares",text:"Finish this sentence honestly: 'If you knew what I was thinking right now, you would…'",ar:"كمل هالجملة بصدق: «لو بتعرف شو عم فكر هلق، كنت رح…»"},{id:"de25",categoryId:"dares",text:"What's the most intense eye contact moment we've ever had — and what were you really thinking?",ar:"شو أقوى لحظة تواصل بصري صارت بيناتنا — وشو كنت عم تفكر عن جد وقتها؟"},{id:"de26",categoryId:"dares",text:"Dare: whisper the thing you'd never text me, directly into my ear, slowly.",ar:"تحدي: اهمس الشي اللي عمرك ما تجرأت تبعته برسالة، بأذني مباشرة، ببطء."},{id:"de27",categoryId:"dares",text:"Dare: pick the one item of clothing between us that's most in the way. Handle it. Slowly.",ar:"تحدي: اختار قطعة الملابس الوحيدة بيناتنا اللي أكتر شي عم تعيق. تصرف فيها. ببطء."},{id:"de28",categoryId:"dares",text:"Dare: kiss me like we're somewhere we absolutely should not be doing this.",ar:"تحدي: بوسني وكأنا بمكان ممنوع منعًا باتًا نعمل فيه هيك شي."},{id:"de29",categoryId:"dares",text:"Dare: put my hand exactly where you want it, and don't explain yourself.",ar:"تحدي: حط إيدي بالضبط وين بدك ياها، وما تفسر حالك."},{id:"de30",categoryId:"dares",text:"Dare: for the next two minutes, you're not allowed to be shy. I ask, you answer — fully.",ar:"تحدي: للدقيقتين الجايات، ممنوع تستحي. أنا
