[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# SPA fallback: serve index.html for client-side routes (but not for the
# functions endpoint, which Netlify handles before this rule).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
